base_lm:
  model_name: Qwen/Qwen2.5-1.5B-Instruct
  device: cuda
  max_new_tokens: 256
  temperature: 0.7

diff_lm:
  kind: trainable
  d_model: 1536          # Qwen2.5-1.5B hidden size
  n_layers: 4
  n_heads: 8
  t_max: 50
  ckpt_path: null

span_select:
  kind: random
  num_spans: 4
  unit: sentence

task:
  kind: toy
  variant: digit_shift
  num_tasks: 500
  seed: 0

pretrain:
  num_pool_rollouts: 500
  num_steps: 2000
  batch_size: 16
  lr: 1.0e-4
  max_span_tokens: 64
  sigma_min: 0.01
  sigma_max: 0.5
  t_max: 50
  ckpt_path: outputs/diff_lm_ckpts/trainable_digit_shift.pt
